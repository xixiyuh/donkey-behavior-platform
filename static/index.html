<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>RK3588 Realtime Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { 
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0; padding: 0; background: #0b1020; color: #e7e9ee; 
    }
    .navbar {
      background: #121833; border-bottom: 1px solid #243; padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .navbar h1 { margin: 0; font-size: 18px; color: #60a5fa; }
    .nav-links {
      display: flex; gap: 15px;
    }
    .nav-links a {
      color: #e7e9ee; text-decoration: none; padding: 8px 12px;
      border-radius: 6px; transition: background 0.2s;
    }
    .nav-links a:hover {
      background: #1d2a5a;
    }
    .card { 
      background: #121833; border: 1px solid #243; border-radius: 14px; 
      padding: 20px; max-width: 1080px; margin: 20px auto; 
    }
    h1 { margin-top: 0; font-size: 20px; color: #60a5fa; }
    label { font-size: 14px; color: #b9c2d0; display:block; margin: 8px 0 4px; }
    input, select { 
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #334; 
      background: #172045; color: #e7e9ee; box-sizing: border-box;
    }
    .row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 12px; align-items: end; }
    .buttons { display: flex; gap: 12px; }
    button { 
      cursor: pointer; padding: 10px 14px; border-radius: 10px; 
      border: 1px solid #345; background: #1d2a5a; color: #e7e9ee; 
      transition: background 0.2s;
    }
    button:hover { background: #26346e; }
    button:disabled { background: #666; cursor: not-allowed; }
    #log { 
      white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
      background: #0f1533; padding: 10px; border-radius: 10px; height: 120px; 
      overflow: auto; border: 1px solid #223; font-size: 12px;
    }
    .preview { 
      background: #000; border-radius: 12px; overflow: hidden; 
      border: 1px solid #243; display: flex; align-items: center; 
      justify-content: center; min-height: 360px; position: relative;
    }
    .preview img { width: 100%; height: auto; display: block; }
    .status { 
      position: absolute; top: 10px; right: 10px; 
      padding: 5px 10px; border-radius: 5px; font-size: 12px;
    }
    .status.connected { background: #065f46; color: #d1fae5; }
    .status.disconnected { background: #7f1d1d; color: #fecaca; }
    small { color: #94a3b8; font-size: 12px; }
    .info-panel {
      background: #1a2332; border-radius: 8px; padding: 10px; margin-top: 10px;
      border-left: 3px solid #60a5fa;
    }
    .content-section {
      display: none;
    }
    .content-section.active {
      display: block;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .table-container {
      overflow-x: auto;
      margin-top: 15px;
    }
    table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 8px 12px; text-align: left; border-bottom: 1px solid #334;
      word-wrap: break-word;
    }
    th {
      background: #172045; color: #60a5fa;
    }
    th:nth-child(1), td:nth-child(1) { width: 60px; } /* ID */
    th:nth-child(2), td:nth-child(2) { width: 100px; } /* 摄像头标识 */
    th:nth-child(3), td:nth-child(3) { width: 80px; } /* 所属栏 */
    th:nth-child(4), td:nth-child(4) { width: 100px; } /* 所属养殖舍 */
    th:nth-child(5), td:nth-child(5) { width: 300px; } /* FLV地址 */
    th:nth-child(6), td:nth-child(6) { width: 120px; } /* 操作 */
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>🚀 RK3588 实时检测系统</h1>
    <div class="nav-links">
      <a href="#" onclick="showSection('detection')">实时检测</a>
      <a href="#" onclick="showSection('barns')">养殖舍管理</a>
      <a href="#" onclick="showSection('pens')">栏管理</a>
      <a href="#" onclick="showSection('cameras')">摄像头管理</a>
      <a href="#" onclick="showSection('events')">事件记录</a>
    </div>
  </nav>

  <div class="card">
    <!-- 实时检测页面 -->
    <div id="detection" class="content-section active">
      <h2>实时检测</h2>
      
      <div class="info-panel">
        <small>
          <strong>支持输入源：</strong> 本地视频 | 本地图片<br>
          <strong>AI模型：</strong> YOLOv8 + 对比学习交配行为识别<br>
          <strong>硬件加速：</strong> RK3588 NPU (RKNN Lite2)
        </small>
      </div>
      
      <div class="row" style="margin-bottom: 16px;">
        <div>
          <label for="barn">养殖舍</label>
          <select id="barn" onchange="loadPens()">
            <option value="">请选择养殖舍</option>
          </select>
        </div>
        <div>
          <label for="pen">栏</label>
          <select id="pen" onchange="loadCameras()">
            <option value="">请选择栏</option>
          </select>
        </div>
        <div>
          <label for="camera">摄像头</label>
          <select id="camera">
            <option value="">请选择摄像头</option>
          </select>
        </div>
      </div>
      
      <div class="row">
        <div style="display: flex; gap: 10px; align-items: end;">
          <div style="flex: 1;">
            <label for="kind">输入源类型</label>
            <select id="kind">
              <option value="file">本地视频文件</option>
              <option value="image">本地图片</option>
            </select>
          </div>
          <div style="align-self: end;">
            <input type="file" id="fileInput" style="display: none;" accept="video/*,image/*" onchange="handleFileSelect(this)" />
            <button onclick="document.getElementById('fileInput').click()" title="选择文件">📁</button>
          </div>
        </div>
       
        <div class="buttons">
          <button id="btnStart">🟢 开始</button>
          <button id="btnStop">🔴 停止</button>
          <button id="btnHealth" onclick="checkHealth()">❤️ 健康检查</button>
        </div>
      </div>

    <label style="margin-top:16px;">实时画面</label>
    <div class="preview">
      <img id="preview" alt="等待视频流..." style="display:none;" />
      <div id="placeholder" style="color: #666; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 10px;">📹</div>
        <div>等待连接视频源...</div>
      </div>
      <div id="status" class="status disconnected">未连接</div>
    </div>

    <label style="margin-top:16px;">系统日志</label>
    <div id="log">系统就绪，等待操作...\n</div>
    </div>

    <!-- 养殖舍管理页面 -->
    <div id="barns" class="content-section">
      <h2>养殖舍管理</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="barnName">养殖舍名称</label>
          <input type="text" id="barnName" placeholder="请输入养殖舍名称">
        </div>
        <div class="form-group">
          <label for="barnTotalPens">总栏数</label>
          <input type="number" id="barnTotalPens" placeholder="请输入总栏数" min="1" max="8">
        </div>
      </div>
      <div class="buttons" style="margin-bottom: 15px;">
        <button onclick="createBarn()">添加养殖舍</button>
      </div>
      <div class="table-container">
        <table id="barnTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>名称</th>
              <th>总栏数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <!-- 动态加载 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 栏管理页面 -->
    <div id="pens" class="content-section">
      <h2>栏管理</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="penBarnId">所属养殖舍</label>
          <select id="penBarnId"></select>
        </div>
        <div class="form-group">
          <label for="penNumber">栏编号</label>
          <input type="number" id="penNumber" placeholder="请输入栏编号" min="1">
        </div>
      </div>
      <div class="buttons" style="margin-bottom: 15px;">
        <button onclick="createPen()">添加栏</button>
      </div>
      <div class="table-container">
        <table id="penTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>栏编号</th>
              <th>所属养殖舍</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <!-- 动态加载 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 摄像头管理页面 -->
    <div id="cameras" class="content-section">
      <h2>摄像头管理</h2>
      <div class="form-group">
        <label for="cameraBarnId">所属养殖舍</label>
        <select id="cameraBarnId" onchange="loadPensForCamera()"></select>
      </div>
      <div class="form-group">
        <label for="cameraPenId">所属栏</label>
        <select id="cameraPenId"></select>
      </div>
      <div class="form-group">
        <label for="cameraId">摄像头标识</label>
        <input type="text" id="cameraId" placeholder="请输入摄像头标识（如1-1）">
      </div>
      <div class="form-group">
        <label for="cameraFlvUrl">FLV直播地址</label>
        <input type="text" id="cameraFlvUrl" placeholder="请输入FLV直播地址">
      </div>
      <div class="buttons" style="margin-bottom: 15px;">
        <button onclick="createCamera()">添加摄像头</button>
      </div>
      <div class="table-container">
        <table id="cameraTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>摄像头ID</th>
              <th>所属栏</th>
              <th>所属养殖舍</th>
              <th>FLV地址</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <!-- 动态加载 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 事件记录页面 -->
    <div id="events" class="content-section">
      <h2>事件记录</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="eventBarnId">养殖舍</label>
          <select id="eventBarnId" onchange="loadPensForEvent()"></select>
        </div>
        <div class="form-group">
          <label for="eventPenId">栏</label>
          <select id="eventPenId" onchange="loadEvents()"></select>
        </div>
      </div>
      <div class="buttons" style="margin-bottom: 15px;">
        <button onclick="loadEvents()">查询事件</button>
      </div>
      <div class="table-container">
        <table id="eventTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>开始时间</th>
              <th>结束时间</th>
              <th>持续时间(秒)</th>
              <th>平均置信度</th>
              <th>最大置信度</th>
              <th>所属摄像头</th>
              <th>所属栏</th>
              <th>所属养殖舍</th>
            </tr>
          </thead>
          <tbody>
            <!-- 动态加载 -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 确保$函数和log函数在全局作用域中定义
    window.$ = function(id) { return document.getElementById(id); };
    window.log = function(msg, type = 'info') { 
      const d = new Date().toLocaleTimeString(); 
      const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
      if (window.$('log')) {
        window.$('log').textContent += `[${d}] ${prefix} ${msg}\n`; 
        window.$('log').scrollTop = window.$('log').scrollHeight; 
      }
    };

    // 文件选择处理函数
    function handleFileSelect(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        window.log('文件信息: ' + JSON.stringify(file), 'info');
        
        const valueInput = window.$('value');
        window.log('valueInput元素: ' + (valueInput ? '存在' : '不存在'), 'info');
        
        if (valueInput) {
          // 直接使用文件的name属性
          valueInput.value = file.name;
          window.log('设置valueInput.value为: ' + file.name, 'info');
          // 强制触发input事件，确保值被更新
          valueInput.dispatchEvent(new Event('input'));
        }
        
        // 直接传递文件路径给start函数
        const kindSelect = window.$('kind');
        if (kindSelect) {
          // 根据文件类型设置kind
          if (file.type.startsWith('image/')) {
            kindSelect.value = 'image';
            window.log('设置kind为: image', 'info');
          } else if (file.type.startsWith('video/')) {
            kindSelect.value = 'file';
            window.log('设置kind为: file', 'info');
          }
        }
        
        // 延迟一点时间，确保所有值已设置
        setTimeout(() => {
          // 直接传递文件路径
          startWithFile(file.name);
        }, 200);
      }
    }
    
    // 带文件路径的start函数
    function startWithFile(filePath) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        window.log('WebSocket 已连接，无需重复连接', 'info');
        return;
      }
      
      const kindSelect = window.$('kind');
      
      if (!kindSelect) {
        window.log('未找到id为"kind"的元素', 'error');
        return;
      }
      
      let kind = kindSelect.value;
      let value = filePath;
      
      // 记录当前值，以便调试
      window.log(`当前kind: ${kind}`, 'info');
      window.log(`当前value: ${value}`, 'info');
      
      if (!value) {
        window.log('请选择文件或摄像头', 'error');
        return;
      }
      
      const encodedValue = encodeURIComponent(value);
      const qs = new URLSearchParams();
      qs.set('kind', kind);
      if (encodedValue) qs.set('value', decodeURIComponent(encodedValue));

      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + 
                    location.host + '/ws?' + qs.toString();
      
      window.log(`正在连接: ${kind} - ${value}`, 'info');
      
      ws = new WebSocket(wsUrl);
      const btnStart = window.$('btnStart');
      if (btnStart) {
        btnStart.disabled = true;
      }

      ws.onopen = () => {
        window.log('WebSocket 连接成功', 'success');
        updateStatus(true);
        if (btnStart) {
          btnStart.disabled = false;
        }
      };
      
      ws.onclose = () => {
        window.log('WebSocket 连接已关闭', 'info');
        updateStatus(false);
        if (btnStart) {
          btnStart.disabled = false;
        }
        const preview = window.$('preview');
        const placeholder = window.$('placeholder');
        if (preview) {
          preview.style.display = 'none';
        }
        if (placeholder) {
          placeholder.style.display = 'block';
        }
      };
      
      ws.onerror = (e) => {
        window.log('WebSocket 连接错误: ' + (e?.message || '未知错误'), 'error');
        updateStatus(false);
        if (btnStart) {
          btnStart.disabled = false;
        }
      };

      ws.onmessage = (ev) => {
        const txt = ev.data;
        
        // 处理错误消息
        if (typeof txt === 'string' && txt.startsWith('ERROR::')) {
          window.log(txt, 'error');
          return;
        }
        
        // 处理图像帧
        try {
          const preview = window.$('preview');
          const placeholder = window.$('placeholder');
          if (preview) {
            preview.src = 'data:image/jpeg;base64,' + txt;
            preview.style.display = 'block';
          }
          if (placeholder) {
            placeholder.style.display = 'none';
          }
        } catch (err) {
          window.log('图像帧解析失败: ' + err.message, 'error');
        }
      };
    }

    // 显示指定页面
    function showSection(sectionId) {
      // 隐藏所有页面
      document.querySelectorAll('.content-section').forEach(section => {
        section.classList.remove('active');
      });
      // 显示选中页面
      document.getElementById(sectionId).classList.add('active');
      
      // 根据页面加载对应数据
      if (sectionId === 'detection') {
        loadBarns();
      } else if (sectionId === 'barns') {
        loadBarnTable();
      } else if (sectionId === 'pens') {
        loadBarnsForPen();
        loadPenTable();
      } else if (sectionId === 'cameras') {
        loadBarnsForCamera();
        loadCameraTable();
      } else if (sectionId === 'events') {
        loadBarnsForEvent();
      }
    }

    let ws = null;

    function updateStatus(connected) {
      const status = $('status');
      if (connected) {
        status.className = 'status connected';
        status.textContent = '已连接';
      } else {
        status.className = 'status disconnected';
        status.textContent = '未连接';
      }
    }

    function start() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        window.log('WebSocket 已连接，无需重复连接', 'info');
        return;
      }
      
      const kindSelect = window.$('kind');
      const valueInput = window.$('value');
      const cameraSelect = window.$('camera');
      
      if (!kindSelect) {
        window.log('未找到id为"kind"的元素', 'error');
        return;
      }
      
      let kind = kindSelect.value;
      let value = valueInput ? valueInput.value.trim() : '';
      
      // 记录当前值，以便调试
      window.log(`当前kind: ${kind}`, 'info');
      window.log(`当前value: ${value}`, 'info');
      
      // 如果选择了摄像头，则使用摄像头的FLV地址
      const cameraUrl = cameraSelect ? cameraSelect.value : '';
      if (cameraUrl) {
        value = cameraUrl;
        kind = 'mpv'; // 使用MPV模式处理FLV流
        window.log(`使用摄像头地址: ${value}`, 'info');
      }
      
      if (!value) {
        window.log('请选择文件或摄像头', 'error');
        return;
      }
      
      const encodedValue = encodeURIComponent(value);
      const qs = new URLSearchParams();
      qs.set('kind', kind);
      if (encodedValue) qs.set('value', decodeURIComponent(encodedValue));

      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + 
                    location.host + '/ws?' + qs.toString();
      
      window.log(`正在连接: ${kind} - ${value}`, 'info');
      
      ws = new WebSocket(wsUrl);
      const btnStart = window.$('btnStart');
      if (btnStart) {
        btnStart.disabled = true;
      }

      ws.onopen = () => {
        window.log('WebSocket 连接成功', 'success');
        updateStatus(true);
        if (btnStart) {
          btnStart.disabled = false;
        }
      };
      
      ws.onclose = () => {
        window.log('WebSocket 连接已关闭', 'info');
        updateStatus(false);
        if (btnStart) {
          btnStart.disabled = false;
        }
        const preview = window.$('preview');
        const placeholder = window.$('placeholder');
        if (preview) {
          preview.style.display = 'none';
        }
        if (placeholder) {
          placeholder.style.display = 'block';
        }
      };
      
      ws.onerror = (e) => {
        window.log('WebSocket 连接错误: ' + (e?.message || '未知错误'), 'error');
        updateStatus(false);
        if (btnStart) {
          btnStart.disabled = false;
        }
      };

      ws.onmessage = (ev) => {
        const txt = ev.data;
        
        // 处理错误消息
        if (typeof txt === 'string' && txt.startsWith('ERROR::')) {
          window.log(txt, 'error');
          return;
        }
        
        // 处理图像帧
        try {
          const preview = window.$('preview');
          const placeholder = window.$('placeholder');
          if (preview) {
            preview.src = 'data:image/jpeg;base64,' + txt;
            preview.style.display = 'block';
          }
          if (placeholder) {
            placeholder.style.display = 'none';
          }
        } catch (err) {
          window.log('图像帧解析失败: ' + err.message, 'error');
        }
      };
    }

    function stop() {
      if (ws) {
        try { 
          ws.close(); 
        } catch (e) {
          window.log('关闭连接时出错: ' + e.message, 'error');
        }
        ws = null;
      }
      updateStatus(false);
      const preview = window.$('preview');
      const placeholder = window.$('placeholder');
      if (preview) {
        preview.style.display = 'none';
      }
      if (placeholder) {
        placeholder.style.display = 'block';
      }
      window.log('已停止连接', 'info');
    }

    async function checkHealth() {
      try {
        const response = await fetch('/health');
        const data = await response.json();
        if (data.status === 'ok') {
          window.log('系统健康检查通过 ✅', 'success');
        } else {
          window.log('系统健康检查失败: ' + data.error, 'error');
        }
      } catch (e) {
        window.log('健康检查请求失败: ' + e.message, 'error');
      }
    }

    // 养殖舍管理
    async function loadBarnTable() {
      try {
        const response = await fetch('/api/barns');
        const barns = await response.json();
        const tbody = $('barnTable').querySelector('tbody');
        tbody.innerHTML = '';
        barns.forEach(barn => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${barn.id}</td>
            <td>${barn.name}</td>
            <td>${barn.total_pens}</td>
            <td>
              <button onclick="editBarn(${barn.id})">编辑</button>
              <button onclick="deleteBarn(${barn.id})">删除</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (e) {
        log('加载养殖舍列表失败: ' + e.message, 'error');
      }
    }

    async function createBarn() {
      const name = $('barnName').value.trim();
      const totalPens = $('barnTotalPens').value;
      
      if (!name || !totalPens) {
        log('请填写完整的养殖舍信息', 'error');
        return;

    async function loadPenTable() {

        const barnMap = {};
        barns.forEach(barn => {
          barnMap[barn.id] = barn.name;
        });

        // 获取所有栏信息
        const penResponse = await fetch('/api/pens');
        const pens = await penResponse.json();
        const tbody = $('penTable').querySelector('tbody');
        tbody.innerHTML = '';
        pens.forEach(pen => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${pen.id}</td>
            <td>${pen.pen_number}</td>
            <td>${barnMap[pen.barn_id] || pen.barn_id}</td>
            <td>
              <button onclick="editPen(${pen.id})">编辑</button>
              <button onclick="deletePen(${pen.id})">删除</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (e) {
        log('加载栏列表失败: ' + e.message, 'error');
      }
    }

    async function loadEvents() {
      const barnId = $('eventBarnId').value;
      const penId = $('eventPenId').value;
      
      let url = '/api/mating-events';
      if (penId) {
        url = `/api/pens/${penId}/mating-events`;
      } else if (barnId) {
        url = `/api/barns/${barnId}/mating-events`;
      }
      
      try {
        const response = await fetch(url);
        const events = await response.json();
        const tbody = $('eventTable').querySelector('tbody');
        tbody.innerHTML = '';
        events.forEach(event => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${event.id}</td>
            <td>${event.start_time}</td>
            <td>${event.end_time}</td>
            <td>${event.duration}</td>
            <td>${event.avg_confidence.toFixed(2)}</td>
            <td>${event.max_confidence.toFixed(2)}</td>
            <td>${event.camera_id}</td>
            <td>${event.pen_id}</td>
            <td>${event.barn_id}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (e) {
        log('加载事件记录失败: ' + e.message, 'error');
      }
    }

    // 加载养殖舍列表（用于检测页面）
    async function loadBarns() {
      try {
        const response = await fetch('/api/barns');
        const barns = await response.json();
        const barnSelect = window.$('barn');
        if (!barnSelect) {
          window.log('未找到id为"barn"的元素', 'error');
          return;
        }
        barnSelect.innerHTML = '<option value="">请选择养殖舍</option>';
        barns.forEach(barn => {
          const option = document.createElement('option');
          option.value = barn.id;
          option.textContent = `${barn.name} (${barn.total_pens}栏)`;
          barnSelect.appendChild(option);
        });
        window.log('养殖舍列表加载成功', 'success');
      } catch (e) {
        window.log('加载养殖舍列表失败: ' + e.message, 'error');
      }
    }

    // 加载栏列表（用于检测页面）
    async function loadPens() {
      const barnId = $('barn').value;
      if (!barnId) {
        $('pen').innerHTML = '<option value="">请选择栏</option>';
        $('camera').innerHTML = '<option value="">请选择摄像头</option>';
        return;
      }
      
      try {
        const response = await fetch(`/api/barns/${barnId}/pens`);
        const pens = await response.json();
        const penSelect = $('pen');
        penSelect.innerHTML = '<option value="">请选择栏</option>';
        pens.forEach(pen => {
          const option = document.createElement('option');
          option.value = pen.id;
          option.textContent = `第${pen.pen_number}栏`;
          penSelect.appendChild(option);
        });
        $('camera').innerHTML = '<option value="">请选择摄像头</option>';
        log('栏列表加载成功', 'success');
      } catch (e) {
        log('加载栏列表失败: ' + e.message, 'error');
      }
    }

    // 加载摄像头列表（用于检测页面）
    async function loadCameras() {
      const penId = $('pen').value;
      if (!penId) {
        $('camera').innerHTML = '<option value="">请选择摄像头</option>';
        return;
      }
      
      try {
        const response = await fetch(`/api/pens/${penId}/cameras`);
        const cameras = await response.json();
        const cameraSelect = $('camera');
        cameraSelect.innerHTML = '<option value="">请选择摄像头</option>';
        cameras.forEach((camera, index) => {
          const option = document.createElement('option');
          option.value = camera.flv_url;
          option.textContent = `摄像头 ${index + 1}`;
          cameraSelect.appendChild(option);
        });
        log('摄像头列表加载成功', 'success');
      } catch (e) {
        log('加载摄像头列表失败: ' + e.message, 'error');
      }
    }

    // 事件绑定
    const btnStart = window.$('btnStart');
    if (btnStart) {
      btnStart.addEventListener('click', start);
    }
    const btnStop = window.$('btnStop');
    if (btnStop) {
      btnStop.addEventListener('click', stop);
    }
    
    // 回车快速开始
    const valueInput = window.$('value');
    if (valueInput) {
      valueInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') start();
      });
    }

    // 页面加载完成后的初始化
    window.onload = function() {
      window.log('页面完全加载完成', 'success');
      window.log('RK3588 实时检测系统已就绪', 'success');
      updateStatus(false);
      
      // 立即调用showSection函数，确保默认页面（detection）的养殖舍列表被加载
      window.log('开始加载实时检测页面数据', 'info');
      showSection('detection');
    };
